        <script>
            function getProductId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadProduct() {
  const id = getProductId();

  const res = await fetch("./api/getProducts.php");
  const products = await res.json();


  const p = products.find(prod => prod.product_id == id);

  if (!p) {
    alert("Product not found");
    return;
  }

  // Rating value
  document.getElementById("ratingValue").innerText = p.rating_average;
  
  // Reviews count (FIXED)
  document.querySelector(".rating-info .reviews").innerText = `(${p.rating_count} Reviews)`;

  // Product stars
  const productStars = document.querySelectorAll(".rating-system .stars i");
  const roundedRating = Math.round(p.rating_average);

  productStars.forEach(star => {
    const value = parseInt(star.dataset.value);
    if (value <= roundedRating) {
      star.classList.add("active");
    } else {
      star.classList.remove("active");
    }
  });

  // Product info
  document.getElementById("productName").innerText = p.product_name_en;
  document.getElementById("productPrice").innerText = `$${p.sell_price}`;
  document.getElementById("productDesc").innerText = p.description_en;
  document.getElementById("productWarning").innerText = p.warning_en;
  document.getElementById("productImage").src = p.product_image;
   // Optional: old price & discount
  if (parseInt(p.discount_percentage) > 0) {

    console.log(p.discount_percentage)
    document.getElementById("productOldPrice").style.display = "inline"
        document.getElementById("salelabel").style.display = "inline"

    document.getElementById("productOldPrice").innerText = `$${p.price_before_discount}`;
    const discount = ((p.old_price - p.sell_price) / p.old_price * 100).toFixed(0);
    document.getElementById("discoutperantage").innerText = `${discount}% OFF`;
  }


  const buyBtn = document.getElementById("buyBtn");



buyBtn.addEventListener("click", () => {
  window.location.href = `./checkout.html?id=${p.product_id}`;
});
 
}




async function loadRelatedProducts() {

  const currentId = getProductId();

  const res = await fetch("./api/getProducts.php");
  const products = await res.json();

  const container = document.getElementById("relatedProducts");

  container.innerHTML = "";

  products.forEach(p => {

    // optional: skip current product
    if (p.product_id == currentId) return;

    container.innerHTML += `
      <div class="card">

        <img class="product-image"
             src="${p.product_image}"
             alt="${p.product_name_en}">

        <h2>${p.product_name_en}</h2>

        <h3>$${p.sell_price}</h3>

        <div class="button-container">
          <a href="./product.html?id=${p.product_id}"
             class="buy-button">
             Buy
          </a>
        </div>

      </div>
    `;
  });
}
loadRelatedProducts();
loadProduct();


        </script>
