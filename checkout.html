<style>
/* =========================
   CHECKOUT PAGE
========================= */

.checkout-layout{
    width: 100%;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    padding: 140px var(--leftrightpadding) 60px;
}

/* MAIN CARD */


/* PAYMENT GRID REFINEMENT */
.payment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 25px;
}

.payment-option {
    cursor: pointer;
}

.payment-option input {
    display: none; /* Hide original radio */
}

.payment-card-content {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.payment-option input:checked + .payment-card-content {
    background: rgba(112, 161, 255, 0.15);
    border-color: #70a1ff;
    box-shadow: 0 0 15px rgba(112, 161, 255, 0.3);
}

.payment-card-content img {
    height: 40px;
    width: auto;
    border-radius: 8px;
}

/* UPLOAD BOX REFINEMENT */
.checkout-upload-box {
    position: relative;
    border: 2px dashed rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 40px 20px;
    background: rgba(255, 255, 255, 0.02);
    text-align: center;
    transition: 0.3s;
}

.checkout-upload-box:hover {
    border-color: #70a1ff;
    background: rgba(112, 161, 255, 0.05);
}

.upload-icon {
    width: 40px;
    height: 40px;
    margin-bottom: 10px;
    opacity: 0.6;
}

.upload-content p span {
    color: #70a1ff;
    text-decoration: underline;
}

.checkout-upload-box input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

/* TRUST BADGES */
.trust-badges {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 25px;
    font-size: 0.85rem;
    opacity: 0.6;
}
.checkout-card{

    width: 100%;
    max-width: 900px;

    background: rgba(255,255,255,0.04);

    border: 1px solid rgba(255,255,255,0.08);

    backdrop-filter: blur(14px);

    border-radius: 24px;

    padding: 35px;

    box-shadow: 0 8px 32px rgba(0,0,0,0.35);

    color: white;
}

/* PRODUCT SECTION */

.checkout-product{
    display: flex;
    gap: 35px;

    margin-bottom: 35px;
}

.checkout-product-image{
    width: 320px;
    height: 320px;

    object-fit: cover;

    border-radius: 18px;

    flex-shrink: 0;
}

.checkout-product-info{
    width: 100%;
}

.checkout-product-title{
    font-size: 2rem;

    margin-top: 0;
    margin-bottom: 15px;
}

.checkout-prices{
    display: flex;
    align-items: center;
    gap: 15px;

    margin-bottom: 20px;
}

.checkout-price{
    font-size: 2rem;
    font-weight: bold;

    color: #70a1ff;
}

.input-method-wrapper{
  display: flex;
  align-items: center;
}


.payment-card {
  width: 10%;
  height: 67%;
  border-radius: 12px;
}

.checkout-payment-methods {
  margin-bottom: 25px;
  flex-direction: column;
}
.checkout-old-price{
    color: #ff6b6b;

    text-decoration: line-through;

    opacity: 0.8;

    font-size: 1.1rem;
}

.checkout-product-description{
    line-height: 1.7;

    opacity: 0.8;
}

/* SECTIONS */

.checkout-section{
    margin-top: 35px;
}

.checkout-section-title{
    margin-bottom: 15px;

    font-size: 1.1rem;

    opacity: 0.9;
}

/* PAYMENT METHODS */

.checkout-payment-methods{
    display: flex;
    gap: 15px;
}

.payment-method{

    flex: 1;

    height: 55px;

    border-radius: 14px;

    border: 1px solid rgba(255,255,255,0.08);

    background: rgba(255,255,255,0.05);

    color: white;

    font-size: 15px;

    cursor: pointer;

    transition: 0.2s;
}

.payment-method:hover{
    transform: translateY(-2px);

    background: rgba(255,255,255,0.09);
}

.payment-method.active{
    background: linear-gradient(135deg,#70a1ff,#4d84ff);

    border-color: transparent;
}

/* UPLOAD BOX */

.checkout-upload-box{

    border: 2px dashed rgba(255,255,255,0.15);

    border-radius: 16px;

    padding: 25px;

    background: rgba(255,255,255,0.03);
}

.checkout-upload-box input{

    width: 100%;

    color: white;
}

/* SUBMIT BUTTON */

.checkout-submit-btn{

    width: 100%;

    height: 60px;

    margin-top: 35px;

    border: none;

    border-radius: 16px;

    background: linear-gradient(135deg,#ff9f43,#ff7b00);

    color: white;

    font-size: 17px;

    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;
}

.checkout-submit-btn:hover{

    transform: translateY(-2px);

    opacity: 0.95;
}

/* MOBILE */

@media(max-width:850px){

    .checkout-product{
        flex-direction: column;
    }

    .checkout-product-image{
        width: 100%;
        height: 280px;
    }
}

@media(max-width:550px){

    .checkout-card{
        padding: 20px;
    }

    .checkout-payment-methods{
        flex-direction: column;
    }

    .checkout-product-title{
        font-size: 1.5rem;
    }

    .checkout-price{
        font-size: 1.5rem;
    }
}
</style>
